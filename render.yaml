# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  # --- API ---
  - type: web
    name: chembind-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: REDIS_URL
        sync: false
      - key: RATE_LIMIT_STORAGE_URI
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: TRUSTED_HOSTS
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "0"

  # --- Worker ---
  - type: worker
    name: chembind-worker
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    startCommand: "bash -lc 'chmod +x /app/worker.sh && /app/worker.sh'"
    envVars:
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: ENVIRONMENT
        value: production
